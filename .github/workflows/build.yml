name: Build APEX ULTRA ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  build:
    runs-on: ubuntu-22.04  # Dùng Ubuntu 22.04 để tránh lỗi Python
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Quan trọng: không dùng 3.14
        
    - name: Cache PlatformIO packages
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    
    - name: Install project dependencies
      run: |
        pio lib --global install
        pio run --target clean
    
    - name: Build firmware
      run: pio run
    
    - name: Upload firmware binary
      uses: actions/upload-artifact@v4
      with:
        name: apex-ultra-firmware
        path: |
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/partitions.bin
          .pio/build/esp32dev/bootloader.bin
        retention-days: 30
        compression-level: 9
    
    - name: Upload build logs (nếu lỗi)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: .pio/build/esp32dev/*.log
        retention-days: 7

  # Optional: Release job
  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download firmware artifact
      uses: actions/download-artifact@v4
      with:
        name: apex-ultra-firmware
        path: firmware/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          firmware/firmware.bin
          firmware/partitions.bin
          firmware/bootloader.bin
        body: |
          ## APEX ULTRA V22.0.1
          
          ### Firmware cho ESP32 NAT Router
          
          **Tính năng:**
          - WiFi AP + STA đồng thời
          - NAT (IP Forwarding) qua lwIP
          - WebServer + WebSocket realtime
          - DNS Captive Portal
          - Console handler (ESP-IDF)
          - OTA update
          - Cấu hình qua Web UI
          
          ### Cách flash:
          ```bash
          esptool.py --chip esp32 --port /dev/ttyUSB0 write_flash 0x1000 bootloader.bin 0x8000 partitions.bin 0x10000 firmware.bin
          ```
