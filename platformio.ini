; ============================================================================
; PlatformIO Project Configuration for APEX ULTRA V22.0.1
; ESP-IDF framework - Full merged code (Console + Web + NAT)
; ============================================================================

[platformio]
default_envs = esp32dev

; Common configuration cho tất cả environments
[common]
framework = arduino
platform = espressif32
monitor_speed = 115200
monitor_raw = yes
board_build.flash_mode = dio
board_build.f_cpu = 240000000L

; Build flags - Bật NAT và các tính năng cần thiết
build_flags = 
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_NAT=1
    -DCONFIG_ESP_TASK_WDT=y
    -DCONFIG_STORE_HISTORY=1

; Thư viện cần thiết
lib_deps =
    bblanchon/ArduinoJson@^6.21.3

[env:esp32dev]
extends = common
board = esp32dev

; Upload configuration
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Build type
build_type = release

; Partition table (nếu có file partitions.csv riêng)
; board_build.partitions = partitions.csv

; Nếu cần nhúng file web gzipped, bỏ comment dòng dưới
; board_build.embed_txtfiles = 
;     components/web_server/www/output/gzip/index.html.gz

; Debug
debug_tool = esp-prog
debug_init_break = tbreak app_main

; ============================================================================
; Lưu ý: Các config cũ đã được bỏ/gộp:
; - extra_script_settings (không cần)
; - merge_to_single_bin (không cần cho ESP-IDF)
; - pre_extra_script.py / post_extra_script.py (không cần)
; ============================================================================
