; ============================================================================
; PlatformIO Configuration - Tự động copy ESP-IDF headers
; ============================================================================

[platformio]
default_envs = esp32dev

[common]
framework = arduino
platform = espressif32
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 240000000L

; Thư viện
lib_deps = 
    ottowinter/ESPAsyncWebServer-esphome@^3.0.0
    bblanchon/ArduinoJson@^6.21.3

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_NAT=1
    -DIP_NAPT=1
    -DCONFIG_STORE_HISTORY=1
    
    ; Thêm thư mục chứa headers đã copy
    -Iinclude/espidf

; Extra script - tự động copy headers
extra_scripts = pre:scripts/copy_espidf_headers.py

[env:esp32dev]
extends = common
board = esp32dev
upload_speed = 921600
build_type = release
